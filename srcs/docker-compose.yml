name: inception

# Docker Compose configuration
services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    restart: on-failure
    env_file: .env
    volumes:
      - mdb:/var/lib/mysql
    secrets:
      - db_root_password
      - db_password
    networks:
      - inception_network

#costume network for the project
networks:
  inception_network:
    name: inception_network
    driver: bridge

# named volume for both mariadb and wordpress
volumes:
  mdb:
   driver_opts:
      type: 'none'
      o: bind
      device: /home/sel/data/db
  wp:
   driver_opts:
      type: 'none'
      o: bind
      device: /home/sel/data/wp

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_password:
    file: ./secrets/db_password.txt