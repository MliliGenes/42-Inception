# Redis configuration for WordPress object cache

# Listen on all interfaces so other containers can reach it
bind 0.0.0.0

# Default port
port 6379

# Disable persistence — this is a pure cache, not a data store
save ""
appendonly no

# Limit memory usage
maxmemory 250mb

# Eviction policy: when maxmemory is hit, remove the least-recently-used keys
maxmemory-policy allkeys-lru

# Do not daemonize — Docker manages the process lifecycle
daemonize no

# Log to stdout so Docker captures it
loglevel notice
logfile ""
